name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install -g @bubblewrap/cli
      - run: mkdir twa && cd twa && bubblewrap init --manifest https://itsvanc9.github.io/Rs-estimator/manifest.json && bubblewrap build
      - uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: twa/*.apk
