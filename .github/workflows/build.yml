name: Build APK (TWA via Bubblewrap)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      - name: Initialize TWA project
        run: |
          mkdir -p twa-build
          cd twa-build
          printf 'n\nn\n' | bubblewrap init \
            --manifest "https://itsvanc9.github.io/Rs-estimator/manifest.json"
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Build APK
        working-directory: ./twa-build
        run: |
          printf 'n\n' | bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: "true"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rs-estimator-apk
          path: ./twa-build/app-release-unsigned.apk
