name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Configure Capacitor
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.rsestimator.app",
            "appName": "RS Estimator",
            "webDir": "www"
          }
          EOF
          mkdir -p www
          cp estimator.html www/index.html
          cp manifest.json www/
          cp sw.js www/ 2>/dev/null || true

      - name: Add Android and sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Fix Kotlin duplicate classes
        working-directory: android
        run: |
          cat >> build.gradle << 'EOF'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Patch AndroidManifest for camera and file provider
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml

          # Add CAMERA permission before <application tag
          if ! grep -q 'android.permission.CAMERA' "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <application|' "$MANIFEST"
          fi

          # Add FileProvider inside <application> if not present
          if ! grep -q 'FileProvider' "$MANIFEST"; then
            sed -i 's|</application>|        <provider\n            android:name="androidx.core.content.FileProvider"\n            android:authorities="${applicationId}.fileprovider"\n            android:exported="false"\n            android:grantUriPermissions="true">\n            <meta-data\n                android:name="android.support.FILE_PROVIDER_PATHS"\n                android:resource="@xml/file_paths"/>\n        </provider>\n    </application>|' "$MANIFEST"
          fi

          echo "=== AndroidManifest.xml after patching ==="
          cat "$MANIFEST"

      - name: Create file_paths.xml for FileProvider
        run: |
          mkdir -p android/app/src/main/res/xml
          # Find and update existing file_paths.xml, or create it
          FILE_PATHS=$(find android/app/src/main/res/xml -name "file_paths.xml" 2>/dev/null | head -1)
          if [ -z "$FILE_PATHS" ]; then
            FILE_PATHS=android/app/src/main/res/xml/file_paths.xml
          fi
          cat > "$FILE_PATHS" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="my_images" path="." />
              <external-cache-path name="my_cache_images" path="." />
              <cache-path name="camera_photos" path="photos/" />
              <cache-path name="my_internal_cache" path="." />
              <files-path name="my_files" path="." />
              <external-files-path name="my_external_files" path="." />
          </paths>
          EOF
          echo "=== file_paths.xml ==="
          cat "$FILE_PATHS"

      - name: Patch MainActivity with camera and file bridge
        run: |
          MAIN=$(find android -name "MainActivity.java" -o -name "MainActivity.kt" 2>/dev/null | head -1)
          echo "Found: $MAIN"
          cat > android/app/src/main/java/com/rsestimator/app/MainActivity.java << 'JAVAEOF'
package com.rsestimator.app;

import android.Manifest;
import android.content.pm.PackageManager;
import android.os.Build;
import android.os.Bundle;
import android.os.Environment;
import android.webkit.JavascriptInterface;
import android.webkit.ValueCallback;
import android.webkit.WebChromeClient;
import android.webkit.WebSettings;
import android.webkit.WebView;
import android.net.Uri;
import android.content.Intent;
import android.app.Activity;
import android.util.Base64;
import android.widget.Toast;
import android.provider.MediaStore;
import androidx.core.app.ActivityCompat;
import androidx.core.content.ContextCompat;
import androidx.core.content.FileProvider;
import com.getcapacitor.BridgeActivity;
import java.io.File;
import java.io.FileInputStream;
import java.io.FileOutputStream;
import java.io.ByteArrayOutputStream;
import java.io.IOException;

public class MainActivity extends BridgeActivity {
    private ValueCallback<Uri[]> filePathCallback;
    private static final int FILE_CHOOSER_REQUEST = 1;
    private static final int STORAGE_PERMISSION_REQUEST = 2;
    private static final int CAMERA_REQUEST = 3;
    private File cameraOutputFile;
    private WebView mainWebView;

    @Override
    public void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);

        if (Build.VERSION.SDK_INT < Build.VERSION_CODES.Q) {
            if (ContextCompat.checkSelfPermission(this, Manifest.permission.WRITE_EXTERNAL_STORAGE)
                    != PackageManager.PERMISSION_GRANTED) {
                ActivityCompat.requestPermissions(this,
                    new String[]{Manifest.permission.WRITE_EXTERNAL_STORAGE},
                    STORAGE_PERMISSION_REQUEST);
            }
        }

        mainWebView = getBridge().getWebView();
        WebSettings settings = mainWebView.getSettings();
        settings.setJavaScriptEnabled(true);
        settings.setAllowFileAccess(true);
        settings.setDomStorageEnabled(true);

        mainWebView.addJavascriptInterface(new AndroidBridge(), "AndroidBridge");

        mainWebView.setWebChromeClient(new WebChromeClient() {
            @Override
            public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback,
                    FileChooserParams fileChooserParams) {
                MainActivity.this.filePathCallback = filePathCallback;
                Intent intent = fileChooserParams.createIntent();
                try {
                    startActivityForResult(intent, FILE_CHOOSER_REQUEST);
                } catch (Exception e) {
                    MainActivity.this.filePathCallback = null;
                    return false;
                }
                return true;
            }
        });
    }

    @Override
    protected void onActivityResult(int requestCode, int resultCode, Intent data) {
        if (requestCode == FILE_CHOOSER_REQUEST) {
            if (filePathCallback != null) {
                Uri[] results = null;
                if (resultCode == Activity.RESULT_OK && data != null) {
                    results = new Uri[]{data.getData()};
                }
                filePathCallback.onReceiveValue(results);
                filePathCallback = null;
            }
        } else if (requestCode == CAMERA_REQUEST) {
            if (resultCode == Activity.RESULT_OK
                    && cameraOutputFile != null
                    && cameraOutputFile.exists()
                    && cameraOutputFile.length() > 0) {
                try {
                    byte[] bytes = readFile(cameraOutputFile);
                    String b64 = Base64.encodeToString(bytes, Base64.NO_WRAP);
                    final String dataUrl = "data:image/jpeg;base64," + b64;
                    mainWebView.post(new Runnable() {
                        public void run() {
                            mainWebView.evaluateJavascript(
                                "receiveNativePhoto('" + dataUrl + "')", null);
                        }
                    });
                } catch (Exception e) {
                    e.printStackTrace();
                } finally {
                    cameraOutputFile.delete();
                    cameraOutputFile = null;
                }
            } else if (cameraOutputFile != null) {
                cameraOutputFile.delete();
                cameraOutputFile = null;
            }
        }
        super.onActivityResult(requestCode, resultCode, data);
    }

    private byte[] readFile(File file) throws IOException {
        FileInputStream fis = new FileInputStream(file);
        ByteArrayOutputStream bos = new ByteArrayOutputStream();
        byte[] buf = new byte[8192];
        int len;
        while ((len = fis.read(buf)) != -1) bos.write(buf, 0, len);
        fis.close();
        return bos.toByteArray();
    }

    class AndroidBridge {

        @JavascriptInterface
        public void takePhoto() {
            runOnUiThread(new Runnable() {
                public void run() {
                    try {
                        File dir = new File(getCacheDir(), "photos");
                        dir.mkdirs();
                        cameraOutputFile = File.createTempFile("photo_", ".jpg", dir);
                        Uri photoUri = FileProvider.getUriForFile(
                            MainActivity.this,
                            getPackageName() + ".fileprovider",
                            cameraOutputFile
                        );
                        Intent intent = new Intent(MediaStore.ACTION_IMAGE_CAPTURE);
                        intent.putExtra(MediaStore.EXTRA_OUTPUT, photoUri);
                        intent.addFlags(Intent.FLAG_GRANT_WRITE_URI_PERMISSION);
                        startActivityForResult(intent, CAMERA_REQUEST);
                    } catch (Exception e) {
                        e.printStackTrace();
                    }
                }
            });
        }

        @JavascriptInterface
        public void saveBase64File(String base64Data, String fileName, String mimeType) {
            try {
                String[] parts = base64Data.split(",");
                byte[] bytes = Base64.decode(
                    parts.length > 1 ? parts[1] : parts[0], Base64.DEFAULT);
                File downloadsDir = Environment.getExternalStoragePublicDirectory(
                    Environment.DIRECTORY_DOWNLOADS);
                File file = new File(downloadsDir, fileName);
                FileOutputStream fos = new FileOutputStream(file);
                fos.write(bytes);
                fos.close();
                runOnUiThread(new Runnable() {
                    public void run() {
                        Toast.makeText(MainActivity.this,
                            "Guardado en Descargas: " + fileName,
                            Toast.LENGTH_LONG).show();
                    }
                });
            } catch (IOException e) {
                e.printStackTrace();
                runOnUiThread(new Runnable() {
                    public void run() {
                        Toast.makeText(MainActivity.this,
                            "Error al guardar archivo",
                            Toast.LENGTH_SHORT).show();
                    }
                });
            }
        }
    }
}
JAVAEOF

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rs-estimator-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
